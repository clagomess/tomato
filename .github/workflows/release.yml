name: release
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Get Git tag
        id: extract_git_tag
        run: |
          git_tag=${GITHUB_REF##*/}
          echo "GIT_TAG=${git_tag#v}" >> $GITHUB_ENV
          echo "git_tag=${git_tag#v}" >> $GITHUB_OUTPUT
          echo "Tag: ${git_tag#v}"

      - name: Maven Build
        run: |
          mvn -B -Drevision=${{env.GIT_TAG}} compile package -Dmaven.test.skip
          mkdir ./target/dist
          mv ./target/tomato-${{env.GIT_TAG}} ./target/dist/

      - uses: actions/upload-artifact@v6
        with:
          name: tomato-${{env.GIT_TAG}}
          retention-days: 5
          path: ./target/dist

    outputs:
      git_tag: ${{ steps.extract_git_tag.outputs.git_tag }}

  release-windows:
    needs: [build]
    timeout-minutes: 10
    runs-on: windows-2022

    env:
      GIT_TAG: ${{ needs.build.outputs.git_tag }}

    steps:
      - uses: microsoft/setup-msbuild@v3

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: tomato-${{env.GIT_TAG}}
          path: ./target

      - name: Build AppImage
        run: |
          jpackage `
          --type app-image `
          --name Tomato `
          --app-version $env:GIT_TAG `
          --vendor Tomato `
          --icon ./build-windows/favicon.ico `
          --input ./target/tomato-$env:GIT_TAG `
          --main-jar tomato-$env:GIT_TAG.jar `
          --main-class io.github.clagomess.tomato.Main `
          --java-options "-splash:`$APPDIR/splash.png -Dfile.encoding=UTF-8" `
          --dest ./build-windows `
          --verbose
          mv ./build-windows/Tomato ./build-windows/tomato-$env:GIT_TAG-x64

      - name: Prepare App exe for signing
        run: |
          # jpackage marks the launcher exe read-only, which prevents the
          # signed file from being written back in place.
          Set-ItemProperty -Path "./build-windows/tomato-${{env.GIT_TAG}}-x64/Tomato.exe" -Name IsReadOnly -Value $false

      - name: Sign App
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/build-windows/tomato-${{ env.GIT_TAG }}-x64/Tomato.exe
          output_path: ${{ github.workspace }}/build-windows/signed
          malware_block: false
          override: true
          environment_name: PROD
          clean_logs: true

      - name: Move signed App exe back
        run: |
          # eSigner writes the signed file to output_path; move it back over
          # the original so the portable folder ships the signed launcher.
          Move-Item -Force `
            "./build-windows/signed/Tomato.exe" `
            "./build-windows/tomato-${{env.GIT_TAG}}-x64/Tomato.exe"

      - uses: actions/upload-artifact@v6
        with:
          name: tomato-${{env.GIT_TAG}}-x64-win-portable
          retention-days: 5
          path: ./build-windows/tomato-${{env.GIT_TAG}}-x64

      - name: InnoSetup Build
        run: |
          ISCC.exe `
          /DMyAppVersion=${{env.GIT_TAG}} `
          ./build-windows/tomato-inno-setup.iss
          
      - name: Sign App Setup
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/build-windows/tomato-${{ env.GIT_TAG }}-x64.exe
          output_path: ${{ github.workspace }}/build-windows/signed
          malware_block: false
          override: true
          environment_name: PROD
          clean_logs: true

      - name: Move signed Setup exe back
        run: |
          Move-Item -Force `
            "./build-windows/signed/tomato-${{env.GIT_TAG}}-x64.exe" `
            "./build-windows/tomato-${{env.GIT_TAG}}-x64.exe"

      - uses: actions/upload-artifact@v6
        with:
          name: tomato-${{env.GIT_TAG}}-x64.exe
          compression-level: 0
          retention-days: 5
          path: ./build-windows/tomato-${{env.GIT_TAG}}-x64.exe

  release-linux:
    needs: [build]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        dist: [
          debian,
          fedora,
          flatpak
        ]

    env:
      GIT_TAG: ${{ needs.build.outputs.git_tag }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: tomato-${{env.GIT_TAG}}
          path: ./target/dist

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          docker run --rm --privileged \
          -v "./build-${{matrix.dist}}:/opt/result" \
          -v "./target/dist/tomato-${{env.GIT_TAG}}:/opt/release" \
          -e GIT_TAG=${{env.GIT_TAG}} \
          ghcr.io/clagomess/tomato-build-${{matrix.dist}}
          
      - uses: actions/upload-artifact@v6
        with:
          name: tomato-linux-${{env.GIT_TAG}}-${{matrix.dist}}
          retention-days: 5
          path: ./build-${{matrix.dist}}/tomato-${{env.GIT_TAG}}*

  release-macos:
    needs: [build]
    timeout-minutes: 10
    runs-on: macos-latest

    env:
      GIT_TAG: ${{ needs.build.outputs.git_tag }}

    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: tomato-${{env.GIT_TAG}}
          path: ./target

      - name: Build Dmg
        run: |
          jpackage \
          --type dmg \
          --name Tomato \
          --app-version ${{env.GIT_TAG}} \
          --vendor Tomato \
          --icon ./build-macos/favicon.icns \
          --input ./target/tomato-${{env.GIT_TAG}} \
          --main-jar tomato-${{env.GIT_TAG}}.jar \
          --main-class io.github.clagomess.tomato.Main \
          --java-options "-splash:\$APPDIR/splash.png -Dfile.encoding=UTF-8" \
          --dest ./build-macos \
          --verbose
          mv ./build-macos/Tomato-${{env.GIT_TAG}}.dmg ./build-macos/tomato-${{env.GIT_TAG}}-arm64.dmg

      - uses: actions/upload-artifact@v6
        with:
          name: tomato-${{env.GIT_TAG}}-arm64.dmg
          compression-level: 0
          retention-days: 5
          path: ./build-macos/tomato-${{env.GIT_TAG}}-arm64.dmg
